<div class="container-fluid">

    <h2 class="mb-4">Expense Management</h2>

    <div class="card shadow mb-4">

        <div class="card-header">
            Add Expense
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-4">
                    <label>Title</label>
                    <input
                        [(ngModel)]="expenseData.title"
                        class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Amount</label>
                    <input
                        type="number"
                        [(ngModel)]="expenseData.amount"
                        class="form-control">
                </div>

                <div class="col-md-4">
                    <label>Date</label>
                    <input
                        type="date"
                        [(ngModel)]="expenseData.date"
                        class="form-control">
                </div>

            </div>

            <button
                class="btn btn-success mt-3"
                (click)="addExpense()">

                Save Expense

            </button>

        </div>

    </div>

   <!-- summary -->

    <div class="card shadow mb-4">

        <div class="card-header">
            Monthly Expense Summary
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-3">
                    <input
                        type="number"
                        class="form-control"
                        placeholder="Month"
                        [(ngModel)]="month">
                </div>

                <div class="col-md-3">
                    <input
                        type="number"
                        class="form-control"
                        placeholder="Year"
                        [(ngModel)]="year">
                </div>

                <div class="col-md-3">
                    <button
                        class="btn btn-success"
                        (click)="getSummary()">

                        Get Summary

                    </button>
                </div>

            </div>

            <div class="alert alert-info mt-3">

                Total Expense :
                <strong>₹ {{ totalExpense }}</strong>

            </div>

        </div>

    </div>

    

    <div class="card shadow">

        <div class="card-header">
            Expense List
        </div>

        <div class="card-body">

            <table class="table  table-bordered">

                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Amount</th>
                        <th>Date</th>
                    </tr>
                </thead>

                <tbody>

                    @for(expense of expenses; track expense._id){

                    <tr>

                        <td>{{ expense.title }}</td>

                        <td>₹ {{ expense.amount }}</td>

                        <td>{{ expense.date | date:'dd-MM-yyyy' }}</td>

                    </tr>

                    }

                </tbody>

            </table>

        </div>

    </div>

</div>
